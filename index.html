<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем иконки для красоты -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="container">
        <!-- Боковое меню (Sidebar) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">🚀</span>
                <span class="logo-text">ADMIN.UI</span>
            </div>
            <nav class="menu">
                <a href="#" class="menu-link active"><span class="material-icons">dashboard</span> Главная</a>
                <a href="#" class="menu-link"><span class="material-icons">article</span> Посты</a>
                <a href="#" class="menu-link"><span class="material-icons">analytics</span> Аналитика</a>
                <a href="#" class="menu-link"><span class="material-icons">settings</span> Настройки</a>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="main">
            <header class="navbar">
                <button class="toggle-btn" id="toggleBtn">
                    <span class="material-icons">menu</span>
                </button>
                <h1>Консоль управления</h1>
                <div class="user-profile">
                    <img src="https://ui-avatars.com" alt="Avatar">
                </div>
            </header>

            <section class="content">
                <!-- Форма создания -->
                <div class="card create-post">
                    <h2>Новая публикация</h2>
                    <input type="text" id="postTitle" placeholder="Заголовок статьи...">
                    <textarea id="postContent" placeholder="Текст вашей публикации..."></textarea>
                    <button class="btn-pub" onclick="createPost()">
                        <span class="material-icons">send</span> Опубликовать
                    </button>
                </div>

                <!-- Лента постов -->
                <div class="feed-header">
                    <h2>Лента публикаций</h2>
                </div>
                <div id="postsList" class="posts-grid">
                    <!-- Сюда скрипт добавит посты -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
